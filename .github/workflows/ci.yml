name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install Deno (sandboxed runtime for the convergence gate)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test (includes cross-language convergence gate)
        run: cargo test --all-targets

      - name: Cross-language convergence (zero-permission Deno receipt)
        run: deno run verify/crosscheck.mjs

      - name: Release build
        run: cargo build --release

  legacy-js:
    name: Legacy JS (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: legacy/package-lock.json
      - run: npm ci
      - run: npm test
